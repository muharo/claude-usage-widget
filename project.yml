# XcodeGen project specification.
#
# Run `xcodegen generate` (after `brew install xcodegen`) to materialise
# ClaudeUsageWidget.xcodeproj from this file.
#
# IMPORTANT: edit `DEVELOPMENT_TEAM` below to your Apple Developer team ID
# (any free personal team works) so the App Group entitlement resolves.

name: ClaudeUsageWidget
options:
  bundleIdPrefix: com.robert
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  defaultConfig: Release

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_STRICT_CONCURRENCY: minimal
    GENERATE_INFOPLIST_FILE: NO

targets:

  ClaudeUsageWidget:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: App
      - path: Shared
      - path: Resources/Assets.xcassets
    info:
      path: App/Info.plist
      properties:
        CFBundlePackageType: APPL
        LSUIElement: true
        LSApplicationCategoryType: public.app-category.utilities
    entitlements:
      path: App/ClaudeUsageWidget.entitlements
      properties:
        com.apple.security.app-sandbox: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.robert.ClaudeUsageWidget
        PRODUCT_NAME: ClaudeUsageWidget
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/ClaudeUsageWidget.entitlements
    dependencies:
      - target: ClaudeUsageWidgetExtension

  ClaudeUsageWidgetExtension:
    type: app-extension
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Widget
      - path: Shared
    info:
      path: Widget/Info.plist
      properties:
        CFBundlePackageType: "XPC!"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Widget/ClaudeUsageWidgetExtension.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.robert.ClaudeUsageWidget.WidgetExtension
        PRODUCT_NAME: ClaudeUsageWidgetExtension
        INFOPLIST_FILE: Widget/Info.plist
        CODE_SIGN_ENTITLEMENTS: Widget/ClaudeUsageWidgetExtension.entitlements
        SKIP_INSTALL: YES
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
      - sdk: AppIntents.framework  # needed for RefreshIntent (AppIntent)
